apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: collaborative-editor
data:
  MIX_ENV: "prod"
  PORT: "4000"
  DATABASE_URL: "ecto://postgres:postgres@postgres-service:5432/collaborative_editor_prod"
  REDIS_URL: "redis://:redispassword@redis-service:6379"

---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: collaborative-editor
type: Opaque
data:
  SECRET_KEY_BASE: eW91cl9zZWNyZXRfa2V5X2Jhc2VfaGVyZQ== # base64 encoded secret
  JWT_SECRET: eW91cl9qd3Rfc2VjcmV0X2hlcmU= # base64 encoded JWT secret

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: collaborative-editor
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: collaborative-editor/backend:latest
        ports:
        - containerPort: 4000
        envFrom:
        - configMapRef:
            name: backend-config
        - secretRef:
            name: backend-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 5
          periodSeconds: 5
      initContainers:
      - name: migrate
        image: collaborative-editor/backend:latest
        command: ["bin/collaborative_editor", "eval", "CollaborativeEditor.Release.migrate"]
        envFrom:
        - configMapRef:
            name: backend-config
        - secretRef:
            name: backend-secret

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: collaborative-editor
spec:
  selector:
    app: backend
  ports:
  - port: 4000
    targetPort: 4000
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: collaborative-editor
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource  
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80